<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
    <link rel="stylesheet" href="./style.css">
    <link href="https://fonts.googleapis.com/css2?family=Kumbh+Sans:wght,YOPQ@100..900,300&display=swap" rel="stylesheet">
    <title>Frontend Mentor | Profile card component</title>
    <style>
        .attribution { font-size: 0.6875rem; text-align: center; }
        .attribution a { color: hsl(228, 45%, 44%); }
    </style>
</head>
<body>
    <div class="content">
        <img  class="colorful-image" src="./Images/bg-pattern-card.svg" alt="Colorful pattern">
        <img class="profile-image" src="./Images/image-victor.jpg" alt="Profile image">
        <p class="name">Victor Crest<span class="age"> 26</span></p>
        <p class="location">London</p>
        <hr class="line">
    <div class="stats">
        <p class="number">80K</p>
        <p class="number">803K</p>
        <p class="number">1.4K</p>    
        <p class="label">Followers</p>
        <p class="label">Likes</p>
        <p class="label">Photos</p>
    </div>
    </div>
</body>
</html>
